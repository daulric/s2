name: Notify Successful Workflow Runs

on:
  workflow_dispatch:
  workflow_run:
    branches:
      - "**"
    workflows:
      - App Build
      - Codecov Tests and Upload Coverage
      - Lines of Code
      - OSV-Scanner
      - CodeQL Advanced
    types:
      - completed

permissions:
  contents: read
  actions: read

jobs:
  notify:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Ensure Discord webhook secret exists
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "Missing required secret: DISCORD_WEBHOOK_URL"
            exit 1
          fi

      - name: Check monitored workflow status for this commit
        if: ${{ github.event_name == 'workflow_run' }}
        id: status
        uses: actions/github-script@v7
        with:
          script: |
            const monitoredNames = new Set([
              "App Build",
              "Codecov Tests and Upload Coverage",
              "Lines of Code",
              "OSV-Scanner",
              "CodeQL Advanced",
            ]);

            const { owner, repo } = context.repo;
            const headSha = context.payload.workflow_run.head_sha;
            const currentEvent = context.payload.workflow_run.event;

            const { data } = await github.rest.actions.listWorkflowRunsForRepo({
              owner,
              repo,
              head_sha: headSha,
              per_page: 100,
            });

            const candidates = data.workflow_runs.filter((run) => {
              return monitoredNames.has(run.name) && run.event === currentEvent;
            });

            const latestRunByWorkflowId = new Map();
            for (const run of candidates) {
              const existing = latestRunByWorkflowId.get(run.workflow_id);
              if (!existing) {
                latestRunByWorkflowId.set(run.workflow_id, run);
                continue;
              }

              const runIsNewer =
                run.run_attempt > existing.run_attempt ||
                (run.run_attempt === existing.run_attempt && run.id > existing.id);

              if (runIsNewer) {
                latestRunByWorkflowId.set(run.workflow_id, run);
              }
            }

            const latestRuns = [...latestRunByWorkflowId.values()];
            const pendingRuns = latestRuns.filter((run) => run.status !== "completed");
            const failedRuns = latestRuns.filter((run) => run.conclusion !== "success");
            const allSuccess =
              latestRuns.length > 0 &&
              pendingRuns.length === 0 &&
              failedRuns.length === 0;

            const details = latestRuns
              .map((run) => `- ${run.name}: ${run.conclusion || run.status}`)
              .join("\n");

            core.setOutput("all_success", allSuccess ? "true" : "false");
            core.setOutput("details", details || "- No monitored runs found");
            core.setOutput("head_sha", headSha);
            core.setOutput("event_name", currentEvent);
            core.setOutput("run_url", context.payload.workflow_run.html_url);

      - name: Prepare manual dispatch status output
        if: ${{ github.event_name == 'workflow_dispatch' }}
        id: status_manual
        run: |
          echo "all_success=true" >> "$GITHUB_OUTPUT"
          echo "details=- Manual workflow_dispatch test run" >> "$GITHUB_OUTPUT"
          echo "head_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "event_name=workflow_dispatch" >> "$GITHUB_OUTPUT"
          echo "run_url=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" >> "$GITHUB_OUTPUT"

      - name: Show notification decision
        run: |
          echo "workflow event: ${{ github.event_name }}"
          echo "workflow_run all_success: ${{ steps.status.outputs.all_success }}"
          echo "workflow_dispatch all_success: ${{ steps.status_manual.outputs.all_success }}"
          echo "details:"
          echo "${{ steps.status.outputs.details || steps.status_manual.outputs.details }}"

      - name: Send Discord notification
        if: ${{ steps.status.outputs.all_success == 'true' || steps.status_manual.outputs.all_success == 'true' }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          MESSAGE: |
            ✅ All monitored workflows completed successfully.
            Repository: ${{ github.repository }}
            Branch: ${{ github.event.workflow_run.head_branch || github.ref_name }}
            Event: ${{ steps.status.outputs.event_name || steps.status_manual.outputs.event_name }}
            Commit: ${{ steps.status.outputs.head_sha || steps.status_manual.outputs.head_sha }}

            Results:
            ${{ steps.status.outputs.details || steps.status_manual.outputs.details }}

            Triggering workflow run:
            ${{ steps.status.outputs.run_url || steps.status_manual.outputs.run_url }}
        run: |
          payload=$(python - <<'PY'
          import json, os
          print(json.dumps({"content": os.environ["MESSAGE"]}))
          PY
          )
          curl --fail --silent --show-error \
            -H "Content-Type: application/json" \
            -X POST \
            -d "$payload" \
            "$DISCORD_WEBHOOK_URL"
