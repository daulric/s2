name: CI - Multi Runtime Next.js App

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  node-job:
    name: 🔵 Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [16.x, 18.x, 20.x]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - run: npm install
      - run: npm run lint
      - run: npm run build
      - run: npm test

  bun-job:
    name: 🟣 Bun
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v1

      - run: bun install
      - run: bun test || echo "bun test failed (ok if not supported)"
      - run: bun lint || echo "bun lint failed (optional)"

  deno-job:
    name: 🟠 Deno
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Run Deno Lint (optional)
        run: deno lint || echo "deno lint skipped"

      - name: Run Deno Test (if you have deno test files)
        run: deno test || echo "deno test skipped"
