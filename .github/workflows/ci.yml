name: CI - Multi Runtime Next.js App

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  bun-job:
    name: 🟣 Bun + Supabase Local
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321

    steps:
      - name: 🧾 Checkout code
        uses: actions/checkout@v4

      - name: 🛠️ Install Bun
        uses: oven-sh/setup-bun@v1

      - name: ⚙️ Initialize Supabase
        run: bunx supabase init || echo "already initialized"

      - name: ▶️ Start Supabase
        run: bunx supabase start &
      
      - name: ⏱ Wait for Supabase to boot
        run: |
          echo "Waiting for Supabase at http://localhost:54321..."
          for i in {1..30}; do
            curl --silent http://localhost:54321/rest/v1/ || break
            sleep 2
          done

      - name: 📦 Install dependencies
        run: bun install

      - name: 🧹 Lint (optional)
        run: bun run lint || echo "No lint script"

      - name: 🛠️ Build Next.js app
        run: bun run build

      - name: ✅ Run tests (uses local Supabase)
        run: bun test || echo "No tests"
