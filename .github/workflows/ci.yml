name: App Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  bun-job:
    name: App Build
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: supabase-anon-key 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Initialize and start Supabase
        run: |
          bunx supabase init || echo "already initialized"
          bunx supabase start
          echo "Waiting for Supabase at http://localhost:54321..."
          for i in {1..30}; do
            if curl --silent --fail http://localhost:54321/rest/v1/ > /dev/null; then
              echo "Supabase is up."
              break
            fi
            sleep 2
          done

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Build Next.js app
        run: bun run build
