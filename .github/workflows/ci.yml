name: CI - Multi Runtime Next.js App

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  bun-job:
    name: 🟣 Bun
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v1

      - run: bun install
      - run: bun run build
